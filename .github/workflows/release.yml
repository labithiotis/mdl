name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply to package.json
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: Explicit version (optional)
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      previous_tag: ${{ steps.previous_release.outputs.previous_tag }}
      release_notes: ${{ steps.release_notes.outputs.body }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify release branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Releases must be dispatched from the main branch."
            exit 1
          fi

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release checks
        run: bun check && bun lint && bun test:unit

      - name: Bump package version
        id: version
        env:
          RELEASE_BUMP: ${{ github.event.inputs.bump }}
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "${RELEASE_VERSION}" ]; then
            npm version "${RELEASE_VERSION}" --no-git-tag-version --allow-same-version
          else
            npm version "${RELEASE_BUMP}" --no-git-tag-version
          fi

          next_version="$(node -p "require('./package.json').version")"

          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${next_version}" >> "$GITHUB_OUTPUT"

      - name: Capture previous release
        id: previous_release
        run: |
          previous_tag="$(git tag --list 'v*' --sort=-creatordate | head -n 1)"
          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: "false"
          preset: conventionalcommits
          skip-bump: "true"
          skip-version-file: "true"
          skip-commit: "true"
          skip-tag: "true"
          skip-git-pull: "true"
          skip-on-empty: "false"
          tag-prefix: v

      - name: Build release notes
        id: release_notes
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.clean_changelog }}
          PREVIOUS_TAG: ${{ steps.previous_release.outputs.previous_tag }}
        run: |
          if [ -n "$PREVIOUS_TAG" ]; then
            log_range="${PREVIOUS_TAG}..HEAD"
            previous_release_display="$PREVIOUS_TAG"
          else
            log_range="HEAD"
            previous_release_display="none"
          fi

          {
            echo "Date: \`$(date -u +"%Y-%m-%d %H:%M UTC")\`"
            echo "Commit: \`${GITHUB_SHA}\`"
            echo

            if [ -n "${CHANGELOG_BODY}" ]; then
              echo "## Release notes"
              printf '%s\n' "${CHANGELOG_BODY}"
              echo
            fi

          } | {
            echo 'body<<EOF'
            cat
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Commit version bump and create release tag
        env:
          RELEASE_NOTES: ${{ steps.release_notes.outputs.body }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "Release branch moved during the workflow. Re-run the release from the latest main."
            exit 1
          fi

          git add package.json
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag -a "${{ steps.version.outputs.tag }}" -m "$RELEASE_NOTES"
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    name: Build
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: release-linux-arm64
            artifact_suffix: linux-arm64
            runner: ubuntu-24.04-arm
            target: bun-linux-arm64
          - artifact_name: release-linux-x64
            artifact_suffix: linux-x64
            runner: ubuntu-latest
            target: bun-linux-x64
          - artifact_name: release-macos-arm64
            artifact_suffix: macos-arm64
            runner: macos-14
            target: bun-darwin-arm64
          - artifact_name: release-macos-x64
            artifact_suffix: macos-x64
            runner: macos-14
            target: bun-darwin-x64
          - artifact_name: release-win-x64
            artifact_suffix: windows-x64
            runner: windows-latest
            target: bun-windows-x64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifact
        run: bun run build --target "${{ matrix.target }}"

      - name: Determine archive name
        id: archive
        shell: bash
        run: |
          extension="tar.gz"

          if [ "${{ runner.os }}" = "Windows" ]; then
            extension="zip"
          fi

          echo "name=mdl-${{ needs.prepare.outputs.tag }}-${{ matrix.artifact_suffix }}.${extension}" >> "$GITHUB_OUTPUT"

      - name: Archive Unix release bundle
        if: runner.os != 'Windows'
        run: tar -czf "${{ steps.archive.outputs.name }}" -C release .

      - name: Archive Windows release bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path release\* -DestinationPath "${{ steps.archive.outputs.name }}"

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.archive.outputs.name }}

  release:
    name: Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download built release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_NAME: ${{ needs.prepare.outputs.tag }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_NOTES: ${{ needs.prepare.outputs.release_notes }}
        shell: bash
        run: |
          shopt -s nullglob
          files=(release/*)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found in release/"
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GH_REPO" \
              --title "$RELEASE_NAME" \
              --notes "$RELEASE_NOTES"
            gh release upload "$RELEASE_TAG" "${files[@]}" \
              --repo "$GH_REPO" \
              --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --repo "$GH_REPO" \
              --title "$RELEASE_NAME" \
              --notes "$RELEASE_NOTES"
          fi

  publish-npm:
    name: Publish to NPM
    needs:
      - prepare
      - release
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build npm package
        run: bun run build:npm

      - name: Configure npm registry auth
        run: echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
