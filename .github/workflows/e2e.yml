name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 0"

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun lint

      - name: Type checks
        run: bun check

      - name: Tests unit
        run: bun test:unit

      - name: Tests e2e
        run: bun test:e2e
